<!DOCTYPE html>
<html>
<head>
    <title>Student AJAX Profile</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-card {
            width: 460px;
            background: #ffffff;
            border-radius: 22px;
            padding: 35px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .logo {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, #2563eb, #0f172a);
            color: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
        }

        h2 {
            margin: 8px 0;
            color: #0f172a;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(135deg, #1e40af, #0f172a);
        }

        #output {
            margin-top: 25px;
        }

        .profile-card {
            background: #f8fafc;
            border-radius: 18px;
            padding: 22px;
            text-align: left;
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.5s ease;
        }

        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }

        .avatar {
            width: 55px;
            height: 55px;
            background: #2563eb;
            color: white;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            margin-right: 14px;
        }

        .profile-header h3 {
            margin: 0;
            color: #0f172a;
        }

        .badge {
            display: inline-block;
            margin-top: 5px;
            background: #dcfce7;
            color: #166534;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #e5e7eb;
        }

        .label {
            color: #64748b;
            font-weight: 600;
        }

        .value {
            color: #0f172a;
            font-weight: 700;
        }

        .loading {
            color: #2563eb;
            font-weight: 600;
            margin-top: 18px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="main-card">
        <div class="logo">S</div>

        <h2>Student Profile Portal</h2>
        <p class="subtitle">Fetch student information using AJAX and JSON</p>

        <button onclick="loadStudent()">View Student Information</button>

        <div id="loading" class="loading"></div>
        <div id="output"></div>
    </div>

    <script>
        function loadStudent() {
            document.getElementById("loading").innerHTML = "Fetching student data...";
            document.getElementById("output").innerHTML = "";

            let xhr = new XMLHttpRequest();

            xhr.open("GET", "student.php", true);

            xhr.onload = function () {
                if (xhr.status === 200) {
                    let student = JSON.parse(xhr.responseText);

                    document.getElementById("loading").innerHTML = "";

                    document.getElementById("output").innerHTML = `
                        <div class="profile-card">
                            <div class="profile-header">
                                <div class="avatar">${student.name.charAt(0)}</div>
                                <div>
                                    <h3>${student.name}</h3>
                                    <span class="badge">Active Student</span>
                                </div>
                            </div>

                            <div class="info-row">
                                <span class="label">Student ID</span>
                                <span class="value">${student.id}</span>
                            </div>

                            <div class="info-row">
                                <span class="label">Department</span>
                                <span class="value">${student.department}</span>
                            </div>

                            <div class="info-row">
                                <span class="label">CGPA</span>
                                <span class="value">${student.cgpa}</span>
                            </div>
                        </div>
                    `;
                }
            };

            xhr.send();
        }
    </script>

</body>
</html>
